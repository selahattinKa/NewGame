    output_range: [1, 3]
    expression: "max(1, floor(max_hp * passive_regen_rate))"
    notes: "Savaş turu başına pasif HP rejenerasyonu. Minimum 1 HP. Çok yavaş — ana iyileşme kaynağı destekçi yeteneğidir."
    added: 2026-06-24
    revised: ""

