# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: stat_distribution_formula
    status: active
    source: design/gdd/canavar-veritabani.md
    referenced_by:
      - design/gdd/canavar-veritabani.md
      - design/gdd/saglik-can-sistemi.md
      - design/gdd/hasar-hesaplama.md
    variables:
      - total_stat_pool
      - archetype_percentage
    output_range: [15, 78]
    expression: "floor(total_stat_pool * archetype_percentage)"
    notes: "Canavar Lv1 bireysel stat hesaplama. Yuvarlama kaybı HP'ye eklenir. Max=floor(225×0.35)=78."
    added: 2026-06-24
    revised: "2026-06-25"

  - name: evolution_stat_formula
    status: active
    source: design/gdd/canavar-veritabani.md
    referenced_by:
      - design/gdd/canavar-veritabani.md
      - design/gdd/canavar-guclendirme.md
    variables:
      - base_stat_pool
      - evolution_bonus
      - stage
    output_range: [100, 441]
    expression: "floor(base_stat_pool * (1 + evolution_bonus) ^ (stage - 1))"
    notes: "Evrim aşaması stat havuzu artışı. Common/Uncommon max stage=2, Rare+ max stage=3."
    added: 2026-06-24
    revised: ""

  - name: element_damage_multiplier
    status: deprecated   # 2026-07-02: element sistemi kaldırıldı (kullanıcı kararı) — hiçbir formülden çağrılmıyor
    source: design/gdd/canavar-veritabani.md
    referenced_by:
      - design/gdd/canavar-veritabani.md
      - design/gdd/hasar-hesaplama.md
    variables:
      - attacker_element
      - defender_element
    output_range: [0.75, 1.50]
    expression: "ELEMENT_MATRIX[attacker][defender]"
    notes: "Ateş→Toprak→Hava→Su→Ateş döngüsü. Avantaj=1.5x, dezavantaj=0.75x, nötr=1.0x. DEPRECATED: element-sistemi.md silindi, bu formül artık hiçbir hasar pipeline'ında kullanılmıyor."
    added: 2026-06-24
    revised: "2026-07-02"

  - name: level_up_cost_formula
    status: active
    source: design/gdd/ekonomi.md
    referenced_by:
      - design/gdd/ekonomi.md
      - design/gdd/canavar-guclendirme.md
    variables:
      - base_level_cost
      - rarity_cost_multiplier
      - level
      - cost_exponent
    output_range: [50, 51500]
    expression: "floor(base_level_cost × rarity_cost_multiplier × level ^ cost_exponent)"
    notes: "Canavar seviye atlama altın maliyeti. Nadirlik ve seviye ile kademeli artar. Max: Legendary Lv49 = floor(50×3.0×343) = 51.450."
    added: 2026-06-24
    revised: "2026-06-25"

  - name: floor_gold_formula
    status: active
    source: design/gdd/ekonomi.md
    referenced_by:
      - design/gdd/ekonomi.md
      - design/gdd/loot-odul-sistemi.md
      - design/gdd/dusuman-ai.md
      - design/gdd/zindan-kesif.md
    variables:
      - base_gold_per_floor
      - floor_number
      - difficulty_multiplier
    output_range: [100, 20000]
    expression: "base_gold_per_floor × floor_number × difficulty_multiplier"
    notes: "Zindan kat temizleme altın ödülü. İleri katlar daha cömert."
    added: 2026-06-24
    revised: ""

  - name: idle_gold_formula
    status: active
    source: design/gdd/ekonomi.md
    referenced_by:
      - design/gdd/ekonomi.md
      - design/gdd/otofarm-idle.md
    variables:
      - idle_gold_per_minute
      - offline_duration
      - tier_2_multiplier
      - tier_3_multiplier
    output_range: [0, 54000]
    expression: "Tier1(idle_gold_per_minute × min(D,480)) + Tier2(× 0.75 × min(max(0,D-480),480)) + Tier3(× 0.50 × min(max(0,D-960),480))"
    notes: "Azalan getirili çevrimdışı altın birikimi. 3 kademe: 0-8h %100, 8-16h %75, 16-24h %50. Maks 1440 dk."
    added: 2026-06-24
    revised: "2026-06-24"

  - name: evolution_cost_formula
    status: active
    source: design/gdd/ekonomi.md
    referenced_by:
      - design/gdd/ekonomi.md
      - design/gdd/canavar-guclendirme.md
    variables:
      - base_evolution_cost
      - rarity_evolution_multiplier
      - stage
    output_range: [1000, 10000]
    expression: "base_evolution_cost × rarity_evolution_multiplier × stage"
    notes: "Canavar evrim altın maliyeti. Common A→B=1000, Legendary B→C=10000."
    added: 2026-06-24
    revised: ""

  - name: passive_regen_formula
    status: active
