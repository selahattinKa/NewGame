    notes: "Destekçi arketip yetenek iyileşme miktarı. healer_skill_rate=0.15-0.25 yetenek seviyesine göre."
    added: 2026-06-24
    revised: ""

  - name: stat_growth_formula
    status: active
    source: design/gdd/canavar-guclendirme.md
    referenced_by:
      - design/gdd/canavar-guclendirme.md
      - design/gdd/hasar-hesaplama.md
      - design/gdd/saglik-can-sistemi.md
    variables:
      - base_stat
      - growth_rate
      - level
    output_range: [15, 195]
    expression: "floor(base_stat × (1 + growth_rate × (level - 1)))"
    notes: "Seviye başına stat büyüme. growth_rate nadirliğe göre: Common=0.02, Uncommon=0.022, Rare=0.025, Epic=0.028, Legendary=0.03."
    added: 2026-06-24
    revised: ""

  - name: final_stat_pipeline
    status: active
    source: design/gdd/canavar-guclendirme.md
    referenced_by:
      - design/gdd/canavar-guclendirme.md
      - design/gdd/hasar-hesaplama.md
      - design/gdd/saglik-can-sistemi.md
      - design/gdd/takim-kurma.md
    variables:
      - base_stat
      - growth_rate
      - level
      - evolution_bonus
      - evo_stage
      - star_bonus
    output_range: [15, 499]
    expression: "floor(base_stat × (1 + growth_rate × (level - 1)) × (1 + evolution_bonus) ^ (evo_stage - 1) × (1 + star_bonus))"
    notes: "Tam güçlendirme pipeline'ı: seviye büyüme × evrim × yıldız. Hasar Hesaplama ve Sağlık/Can bu çıktıyı kullanır."
    added: 2026-06-24
    revised: ""

  - name: damage_formula
    status: active
    source: design/gdd/hasar-hesaplama.md
    referenced_by:
      - design/gdd/hasar-hesaplama.md
    variables:
      - effective_ATK
      - effective_DEF
      - defense_reduction_factor
      - crit_chance
      - crit_multiplier
      - variance
    output_range: [1, 1800]
    # was: [1, 290] before 2026-06-25 — updated after canavar-guclendirme GDD revealed effective_ATK max ~499 (full pipeline: Lv50 + Form C + ★5)
    expression: "max(1, floor(max(1, effective_ATK - floor(effective_DEF / defense_reduction_factor)) × crit_multiplier? × variance))"
    notes: "Tam hasar pipeline'ı: stat çözümleme → temel hasar → kritik → varyans → clamp → uygulama. Min=1 garantili. DEPRECATED referenced_by removed 2026-07-02: canavar-guclendirme.md ve hibrit-savas.md deprecated dosyalar, element_multiplier terimi element sistemi kaldırıldığı için formülden çıkarıldı."
    added: 2026-06-24
    revised: "2026-07-02"

  - name: team_power_formula
    status: active
    source: design/gdd/takim-kurma.md
    referenced_by:
      - design/gdd/takim-kurma.md
      - design/gdd/otofarm-idle.md
    variables:
      - pipeline_STAT
      - synergy_atk_bonus
      - synergy_def_bonus
      - synergy_spd_bonus
    output_range: [60, 6864]
    expression: "Σ(monster_i) [effective_HP + effective_ATK + effective_DEF + effective_SPD]"
    notes: "Takım toplam güç skoru. Effective stat'lar sinerji dahil. HP'ye sinerji uygulanmaz."
